<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergency Contacts</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#8b0000,#ff0000,#b30000);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:#fff;
border-radius:30px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.35);
text-align:center;
animation:fade .8s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:6px solid #ff0000;
box-shadow:0 0 30px rgba(255,0,0,.4);
margin-bottom:20px;
}

h1{
color:#c40000;
font-size:34px;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:30px;
font-size:15px;
}

.contact{
background:#fff;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.contact h2{
font-size:28px;
color:#222;
margin-bottom:8px;
}

.number{
font-size:26px;
font-weight:bold;
color:#d50000;
margin-bottom:15px;
}

.call{
display:block;
text-decoration:none;
background:#18b63c;
color:#fff;
padding:15px;
border-radius:12px;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.call:hover{
transform:scale(1.05);
background:#139532;
}

.footer{
margin-top:25px;
background:#d40000;
color:#fff;
padding:20px;
border-radius:18px;
}

.footer h3{
margin-bottom:8px;
}

.footer p{
font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<img src="retouch_2026062221580185.jpg" class="logo">

<h1>🚨 Emergency Contacts</h1>

<p class="subtitle">
In case of emergency, call immediately.
</p>

<div class="contact">

<h2>👨 ABBU</h2>

<div class="number">
01863753362
</div>

<a href="tel:01863753362" class="call">
📞 Call Now
</a>

</div>

<div class="contact">

<h2>👩 AMMU</h2>

<div class="number">
01732786717
</div>

<a href="tel:01732786717" class="call">
📞 Call Now
</a>

</div>

<div class="footer">

<h3>❤️ Stay Safe</h3>

<p>Your safety is our first priority.</p>

</div>

</div>

</body>
  </html>
